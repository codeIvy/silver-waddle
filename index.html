<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0b0d">
<title>Inicio</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: #0a0b0d;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
    color: #fff;
    -webkit-font-smoothing: antialiased;
  }
  body { display: flex; align-items: center; justify-content: center; }
  .device {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, #2a1b3d 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 30% 100%, #1a2e3d 0%, transparent 55%),
      linear-gradient(180deg, #14101c 0%, #0a0b14 60%, #08060c 100%);
  }
  @media (min-width: 500px) {
    body { background: #0a0b0d; padding: 20px; }
    .device {
      width: 390px;
      height: 844px;
      max-height: 95vh;
      border-radius: 44px;
      border: 10px solid #1a1c1f;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7), inset 0 0 0 1px #2a2c30;
    }
    .device::before {
      content: "";
      position: absolute;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      width: 110px; height: 32px;
      background: #0a0b0d;
      border-radius: 20px;
      z-index: 100;
    }
  }

  .wallpaper-stars { position: absolute; inset: 0; pointer-events: none; opacity: 0.55; z-index: 0; }

  .statusbar {
    height: 50px; padding: 18px 28px 0;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 15px; font-weight: 600; letter-spacing: 0.2px;
    flex-shrink: 0; z-index: 50;
  }
  .statusbar .right { display: flex; align-items: center; gap: 6px; }
  .signal { display: inline-flex; align-items: flex-end; gap: 2px; height: 12px; }
  .signal i { width: 3px; background: #fff; border-radius: 1px; }
  .signal i:nth-child(1) { height: 4px; }
  .signal i:nth-child(2) { height: 6px; }
  .signal i:nth-child(3) { height: 8px; opacity: 0.5; }
  .signal i:nth-child(4) { height: 10px; opacity: 0.3; }
  .battery {
    position: relative; width: 26px; height: 13px;
    border: 1.2px solid #fff; border-radius: 3px; padding: 1.5px;
  }
  .battery::after {
    content: ""; position: absolute; right: -3px; top: 3.5px;
    width: 2px; height: 5px; background: #fff; border-radius: 0 1px 1px 0;
  }
  .battery .fill { height: 100%; width: 14%; background: #ff5252; border-radius: 1px; }

  .clock {
    text-align: center;
    margin-top: 18px;
    z-index: 5;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }
  .clock .date {
    font-size: 14px; font-weight: 500;
    letter-spacing: 0.2px;
    color: rgba(255,255,255,0.85);
    margin-bottom: -4px;
  }
  .clock .time {
    font-size: 84px;
    font-weight: 200;
    letter-spacing: -3px;
    line-height: 1;
    color: #fff;
  }

  .grid {
    flex: 1;
    padding: 32px 22px 18px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px 14px;
    align-content: start;
    z-index: 5;
  }

  .app {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    color: #fff;
    position: relative;
  }
  .icon {
    width: 60px; height: 60px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    overflow: hidden;
    position: relative;
  }
  .label {
    font-size: 11px;
    font-weight: 400;
    text-align: center;
    line-height: 1.1;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    color: rgba(255,255,255,0.95);
  }
  .badge {
    position: absolute;
    top: -4px; right: 6px;
    min-width: 20px; height: 20px;
    border-radius: 10px;
    background: #ff3b30;
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    padding: 0 6px;
    box-shadow: 0 0 0 1.5px rgba(10,11,13,0.4);
    z-index: 2;
  }

  .icon.cam { background: linear-gradient(160deg, #4a4a4d, #1c1c1e); }
  .icon.photos { background: #fff; }
  .icon.notes { background: linear-gradient(180deg, #fef4c5 50%, #f5cd47 50%); }
  .icon.mail { background: linear-gradient(180deg, #38b3f6, #1a6fc4); }
  .icon.maps { background: linear-gradient(160deg, #2d5a3d, #1a3d2a); }
  .icon.jade { background: linear-gradient(160deg, #1ab581, #0c7a5a); }
  .icon.calendar { background: #fff; flex-direction: column; padding: 4px 0 0; gap: 0; }
  .icon.weather { background: linear-gradient(180deg, #4ba3e0, #1a5a96); }
  .icon.browser { background: linear-gradient(160deg, #5c6c84, #2a3445); }
  .icon.files { background: linear-gradient(160deg, #2a4d8a, #15264a); }
  .icon.translate { background: linear-gradient(160deg, #4a7bc8, #2855a0); }
  .icon.settings { background: linear-gradient(160deg, #6c6c70, #2c2c2e); }
  .icon.health { background: #fff; }
  .icon.music { background: linear-gradient(160deg, #ff5e7e, #d6294f); }
  .icon.clock { background: #1a1a1a; border: 1.5px solid #fff; }
  .icon.calc { background: linear-gradient(180deg, #2a2a2a, #0a0a0a); }
  .icon.phone { background: linear-gradient(160deg, #4ade80, #1a8a3a); }

  .calendar-month { color: #ff3b30; font-size: 9px; font-weight: 600; line-height: 1; padding-top: 6px; }
  .calendar-day { color: #1a1a1a; font-size: 26px; font-weight: 300; line-height: 1; margin-top: -2px; }

  .clock-glyph {
    position: relative;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: #fff;
  }
  .clock-glyph::before, .clock-glyph::after {
    content: "";
    position: absolute;
    background: #1a1a1a;
    left: calc(50% - 0.75px); top: 4px;
    width: 1.5px;
  }
  .clock-glyph::before { height: 14px; transform-origin: center bottom; transform: rotate(35deg); }
  .clock-glyph::after { height: 11px; transform-origin: center bottom; transform: rotate(-95deg); top: 7px; }
  .clock-glyph i {
    position: absolute;
    left: 50%; top: 50%;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #ff5252;
    transform: translate(-50%, -50%);
    z-index: 2;
  }

  .dock {
    margin: 0 16px 28px;
    padding: 12px;
    border-radius: 28px;
    background: rgba(30, 30, 36, 0.55);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    z-index: 5;
    border: 0.5px solid rgba(255,255,255,0.08);
  }
  .dock .app .label { display: none; }

  .home-indicator {
    width: 134px; height: 5px;
    border-radius: 3px;
    background: rgba(255,255,255,0.6);
    margin: 0 auto 8px;
    z-index: 5;
  }
</style>
</head>
<body>

</div>
</body>
</html>
