<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WhatsApp</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --chat-bg: #0b141a;
    --header-bg: #1f2c33;
    --bubble-other: #1f2c33;
    --bubble-system: #182229;
    --text-primary: #e9edef;
    --text-secondary: #8696a0;
    --text-meta: #667781;
    --user-kamy: #f48fb1;
    --user-tyler: #80cbc4;
    --user-priya: #b39ddb;
    --user-jordan: #ffd54f;
    --user-maddie: #a5d6a7;
    --user-hartwell: #ff9999;
    --user-ada: #e0bbff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #000; font-family: 'Inter', -apple-system, sans-serif; color: var(--text-primary); overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at center, #1a1a1a 0%, #000 100%); }

  .phone {
    width: 100%; max-width: 420px; height: 100vh; max-height: 900px;
    background: var(--chat-bg); position: relative; display: flex; flex-direction: column;
    overflow: hidden; box-shadow: 0 0 0 12px #0a0a0a, 0 0 0 13px #2a2a2a, 0 30px 80px rgba(0, 0, 0, 0.7);
    border-radius: 38px;
  }

  @media (max-width: 480px) {
    body { background: var(--chat-bg); }
    .phone { max-width: 100%; max-height: 100%; border-radius: 0; box-shadow: none; }
  }

  .notch { height: 30px; background: #000; position: relative; }
  .notch::before { content: ''; position: absolute; top: 6px; left: 50%; transform: translateX(-50%); width: 110px; height: 22px; background: #000; border-radius: 0 0 16px 16px; }

  .status-bar { background: var(--header-bg); padding: 6px 22px 4px; display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .status-right { display: flex; gap: 6px; align-items: center; font-size: 11px; }
  .battery { width: 22px; height: 11px; border: 1px solid var(--text-primary); border-radius: 2px; padding: 1px; position: relative; }
  .battery::after { content: ''; position: absolute; right: -3px; top: 3px; width: 2px; height: 5px; background: var(--text-primary); }
  .battery-fill { background: #f87171; height: 100%; }

  .chat-header { background: var(--header-bg); padding: 10px 14px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; border-bottom: 1px solid rgba(0, 0, 0, 0.2); }
  .back-arrow { font-size: 24px; font-weight: 300; padding: 4px 6px; }
  .group-icon { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #6a4c93, #ff595e); display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .chat-info { flex: 1; min-width: 0; }
  .chat-title { font-size: 16px; font-weight: 500; }
  .chat-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  .messages { flex: 1; overflow-y: auto; padding: 8px 6px 12px; background-color: var(--chat-bg); }
  .messages::-webkit-scrollbar { width: 0; }

  .day-divider { display: flex; justify-content: center; margin: 12px 0 10px; }
  .day-divider span { background: var(--bubble-system); color: var(--text-secondary); font-size: 12px; padding: 4px 12px; border-radius: 8px; }

  .msg { display: flex; margin: 1px 8px; }
  .msg.same-author { margin-top: 1px; margin-left: 16px; }
  .msg:not(.same-author) { margin-top: 8px; }

  .bubble { background: var(--bubble-other); border-radius: 8px; padding: 6px 8px 6px 10px; max-width: 78%; position: relative; overflow: hidden; }
  .msg:not(.same-author) .bubble::before { content: ''; position: absolute; top: 0; left: -8px; width: 0; height: 0; border-style: solid; border-width: 0 8px 8px 0; border-color: transparent var(--bubble-other) transparent transparent; }

  .author-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .author-name.kamy { color: var(--user-kamy); }
  .author-name.tyler { color: var(--user-tyler); }
  .author-name.priya { color: var(--user-priya); }
  .author-name.jordan { color: var(--user-jordan); }
  .author-name.maddie { color: var(--user-maddie); }
  .author-name.hartwell { color: var(--user-hartwell); }
  .author-name.ada { color: var(--user-ada); }

  .msg-image { max-width: 100%; border-radius: 8px; margin-bottom: 6px; display: block; }
  .msg-text { font-size: 14.5px; line-height: 1.32; color: var(--text-primary); word-wrap: break-word; padding-right: 50px; min-height: 18px; }
  .time { position: absolute; bottom: 4px; right: 8px; font-size: 10.5px; color: var(--text-meta); }
  .caps { font-weight: 600; }

  .input-bar { background: var(--header-bg); padding: 8px 10px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .input-pill { flex: 1; background: var(--bubble-other); border-radius: 24px; padding: 10px 14px; color: var(--text-meta); font-size: 14px; display: flex; align-items: center; gap: 10px; }
  .send-btn { width: 42px; height: 42px; background: var(--bubble-other); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 18px; }

  .home-indicator { background: #000; padding: 8px 0; display: flex; justify-content: center; flex-shrink: 0; }
  .home-bar { width: 134px; height: 5px; background: var(--text-primary); border-radius: 3px; opacity: 0.95; }
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>

  <div class="status-bar">
    <span id="time">--:--</span>
    <div class="status-right">
      <span>📶</span>
      <span id="signal">-×</span>
      <div class="battery"><div class="battery-fill" id="batteryFill"></div></div>
      <span id="battery">--%</span>
    </div>
  </div>

  <div class="chat-header">
    <span class="back-arrow">‹</span>
    <div class="group-icon">🦋</div>
    <div class="chat-info">
      <div class="chat-title" id="chatTitle">--</div>
      <div class="chat-subtitle" id="chatSubtitle">--</div>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-bar">
    <span style="font-size: 20px; padding: 6px;">😊</span>
    <div class="input-pill"><span style="flex: 1;">Message</span><span>📎</span><span>📷</span></div>
    <div class="send-btn">🎤</div>
  </div>

  <div class="home-indicator"><div class="home-bar"></div></div>
</div>

<script>
  // Читаємо chat.json з параметру URL або за замовчуванням chat.json
  const params = new URLSearchParams(window.location.search);
  const chatFile = params.get('chat') || 'chat.json';

  fetch(chatFile)
    .then(r => r.json())
    .then(data => {
      const { phone, messages } = data;
      
      // Оновлюємо telefon
      document.getElementById('time').textContent = phone.time;
      document.getElementById('signal').textContent = phone.signal;
      document.getElementById('battery').textContent = phone.battery + '%';
      document.getElementById('batteryFill').style.width = phone.battery + '%';
      document.getElementById('chatTitle').textContent = phone.title;
      document.getElementById('chatSubtitle').textContent = phone.subtitle;
      
      // Рендеруємо повідомлення
      const messagesDiv = document.getElementById('messages');
      let lastAuthor = null;
      
      messages.forEach(msg => {
        if (msg.date) {
          // День дільник
          const divider = document.createElement('div');
          divider.className = 'day-divider';
          divider.innerHTML = `<span>${msg.date}</span>`;
          messagesDiv.appendChild(divider);
        } else {
          // Повідомлення
          const div = document.createElement('div');
          div.className = 'msg' + (msg.sameAuthor && msg.author === lastAuthor ? ' same-author' : '');
          
          let content = `<div class="bubble">`;
          
          // Ім'я (тільки на першому)
          if (!msg.sameAuthor || msg.author !== lastAuthor) {
            content += `<div class="author-name ${msg.author}">${msg.name}</div>`;
          }
          
          // КАРТИНКА
          if (msg.image) {
            content += `<img src="${msg.image}" class="msg-image" alt="photo">`;
          }
          
          // ТЕКСТ
          if (msg.text) {
            content += `<div class="msg-text">${msg.text}</div>`;
          }
          
          // ЧАС
          content += `<div class="time">${msg.time}</div>`;
          content += `</div>`;
          
          div.innerHTML = content;
          messagesDiv.appendChild(div);
          lastAuthor = msg.author;
        }
      });
      
      // Скроль вниз
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    })
    .catch(err => {
      document.getElementById('messages').innerHTML = 
        `<div style="color: #8696a0; text-align: center; padding: 20px;">Error loading ${chatFile}</div>`;
      console.error(err);
    });
</script>

</body>
</html>
